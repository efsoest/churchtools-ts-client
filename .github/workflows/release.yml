name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  id-token: write # Required for OIDC
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate tag format
        env:
          RELEASE_TAG: ${{ github.ref_name }}
        run: test "${RELEASE_TAG#v}" != "${RELEASE_TAG}"

      - name: Verify ref is a git tag
        run: git rev-parse --verify "refs/tags/${{ github.ref_name }}"

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.3.8'

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'
          scope: '@efsoest'

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Verify tag matches package version
        run: test "v$(node -p "require('./package.json').version")" = "${{ github.ref_name }}"

      - name: Format check
        run: bun run format:check

      - name: Typecheck
        run: bun run typecheck

      - name: Test
        run: bun test --pass-with-no-tests

      - name: Build
        run: bun run build

      - name: Publish to npm
        run: |
          if [[ "${{ github.ref_name }}" == *-* ]]; then
            npm publish --access public --provenance --tag beta
          else
            npm publish --access public --provenance
          fi
