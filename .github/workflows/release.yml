name: Release

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'Git tag to release (for example v0.1.0)'
        required: true
        type: string

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ inputs.release_tag }}

      - name: Validate tag format
        env:
          RELEASE_TAG: ${{ inputs.release_tag }}
        run: test "${RELEASE_TAG#v}" != "${RELEASE_TAG}"

      - name: Verify ref is a git tag
        run: git rev-parse --verify "refs/tags/${{ inputs.release_tag }}"

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.3.8'

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'
          scope: '@efsoest'

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Verify tag matches package version
        run: test "v$(node -p "require('./package.json').version")" = "${{ inputs.release_tag }}"

      - name: Format check
        run: bun run format:check

      - name: Typecheck
        run: bun run typecheck

      - name: Test
        run: bun test --pass-with-no-tests

      - name: Build
        run: bun run build

      - name: Publish to npm
        run: npm publish --access public --provenance
